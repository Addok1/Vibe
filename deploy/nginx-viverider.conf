# /etc/nginx/sites-available/viberidegh.online
# Laravel + PHP 8.5-FPM (HTTP only until Certbot SSL is installed)

server {
    listen 80;
    listen [::]:80;
    server_name viberidegh.online www.viberidegh.online viverider.online www.viverider.online;

    root /var/www/viverider/public;
    index index.php;

    charset utf-8;
    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # User uploads — ^~ stops regex static rule from stealing .png/.jpg under /storage/
    location ^~ /storage/ {
        alias /var/www/viverider/storage/app/public/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Vite build assets
    location ^~ /build/ {
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Static assets (images, fonts)
    location ~* \.(?:css|js|mjs|map|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|eot)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

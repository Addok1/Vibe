upstream php-fpm {
    server app:9000;
}

# HTTP — redirect to HTTPS (enable after SSL certs are in place)
server {
    listen 80;
    listen [::]:80;
    server_name viverider.online www.viverider.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.viverider.online$request_uri;
    }
}

# HTTPS — main application
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.viverider.online;

    root /var/www/html/public;
    index index.php index.html;

    ssl_certificate     /etc/letsencrypt/live/viverider.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/viverider.online/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    charset utf-8;
    client_max_body_size 50M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# HTTPS — bare domain redirect to www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name viverider.online;

    ssl_certificate     /etc/letsencrypt/live/viverider.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/viverider.online/privkey.pem;

    return 301 https://www.viverider.online$request_uri;
}

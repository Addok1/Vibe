# =============================================================================
# Viverider — Docker Compose (base)
# Usage:
#   cp .env.docker.example .env
#   docker compose up -d --build
# =============================================================================

name: viverider

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  volumes:
    - .:/var/www/html
    - /var/www/html/vendor
    - /var/www/html/node_modules
    - /var/www/html/public/build
    - storage_data:/var/www/html/storage
  networks:
    - viverider
  depends_on:
    mysql:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------------
  # PHP-FPM application
  # ---------------------------------------------------------------------------
  app:
    <<: *app-common
    container_name: viverider-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9000}:9000"
    environment:
      RUN_MIGRATIONS: "true"
      WAIT_FOR_DB: "true"

  # ---------------------------------------------------------------------------
  # MySQL database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: viverider-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-viverider}
      MYSQL_USER: ${DB_USERNAME:-viverider}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
    - viverider

  # ---------------------------------------------------------------------------
  # Queue worker
  # ---------------------------------------------------------------------------
  queue:
    <<: *app-common
    container_name: viverider-queue
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "false"
      WAIT_FOR_DB: "true"
    command: php artisan queue:work database --sleep=3 --tries=3 --max-time=3600
    depends_on:
      app:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Scheduler (cron replacement)
  # ---------------------------------------------------------------------------
  scheduler:
    <<: *app-common
    container_name: viverider-scheduler
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "false"
      WAIT_FOR_DB: "true"
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_started

volumes:
  mysql_data:
    driver: local
  storage_data:
    driver: local

networks:
  viverider:
    driver: bridge

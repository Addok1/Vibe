# =============================================================================
# Viveride — Docker Compose (base)
# Usage:
#   cp .env.docker.example .env
#   docker compose up -d --build
# =============================================================================

name: viveride

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  env_file: .env
  volumes:
    - .:/var/www/html
    - /var/www/html/vendor
    - /var/www/html/node_modules
    - /var/www/html/public/build
    - storage_data:/var/www/html/storage
  networks:
    - viveride
  depends_on:
    mysql:
      condition: service_healthy

services:
  # ---------------------------------------------------------------------------
  # PHP-FPM application
  # ---------------------------------------------------------------------------
  app:
    <<: *app-common
    container_name: viveride-app
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "true"
      WAIT_FOR_DB: "true"

  # ---------------------------------------------------------------------------
  # Nginx web server
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: viveride-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - .:/var/www/html:ro
      - /var/www/html/vendor
      - /var/www/html/public/build
      - storage_data:/var/www/html/storage:ro
      - ./docker/nginx/default.http.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - viveride

  # ---------------------------------------------------------------------------
  # MySQL database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: viveride-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-viveride}
      MYSQL_USER: ${DB_USERNAME:-viveride}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - viveride

  # ---------------------------------------------------------------------------
  # Queue worker
  # ---------------------------------------------------------------------------
  queue:
    <<: *app-common
    container_name: viveride-queue
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "false"
      WAIT_FOR_DB: "true"
    command: php artisan queue:work database --sleep=3 --tries=3 --max-time=3600
    depends_on:
      app:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Scheduler (cron replacement)
  # ---------------------------------------------------------------------------
  scheduler:
    <<: *app-common
    container_name: viveride-scheduler
    restart: unless-stopped
    environment:
      RUN_MIGRATIONS: "false"
      WAIT_FOR_DB: "true"
    command: php artisan schedule:work
    depends_on:
      app:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Certbot (SSL) — run manually: docker compose run --rm certbot
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot:latest
    container_name: viveride-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    networks:
      - viveride

volumes:
  mysql_data:
    driver: local
  storage_data:
    driver: local
  certbot_www:
    driver: local
  certbot_certs:
    driver: local

networks:
  viveride:
    driver: bridge

name: Deploy to EC2

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/viveride/website
            git pull origin main
            HTTP_PORT=80 HTTPS_PORT=443 MYSQL_PORT=3306 docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            HTTP_PORT=80 HTTPS_PORT=443 MYSQL_PORT=3306 docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T app php artisan migrate --force
            HTTP_PORT=80 HTTPS_PORT=443 MYSQL_PORT=3306 docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T app php artisan optimize:clear
            HTTP_PORT=80 HTTPS_PORT=443 MYSQL_PORT=3306 docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T app php artisan config:cache

name: Viberide CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup PHP + Node
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, intl, gd, pdo_mysql, zip, curl, xml, exif, pcntl
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3: Create .env file
      - name: Create .env file
        env:
          PROD_ENV: ${{ secrets.SERVER_ENV }}
        run: |
          if [ -n "${PROD_ENV}" ]; then
            printf '%s\n' "${PROD_ENV}" > .env
          else
            cp deploy/production.env .env
          fi
          sed -i 's/^APP_ENV=.*/APP_ENV=production/' .env || echo 'APP_ENV=production' >> .env
          grep -q '^NODE_ENV=' .env && sed -i 's/^NODE_ENV=.*/NODE_ENV=production/' .env || echo 'NODE_ENV=production' >> .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=false/' .env || echo 'APP_DEBUG=false' >> .env
          grep -q '^SESSION_DOMAIN=' .env && sed -i 's/^SESSION_DOMAIN=.*/SESSION_DOMAIN=/' .env || echo 'SESSION_DOMAIN=' >> .env
          test -s .env

      # Step 4: Install dependencies + build (CI only — no migrate here)
      - name: Install dependencies and build
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --no-scripts
          if [ -f package-lock.json ]; then npm ci --ignore-scripts; else npm install --ignore-scripts; fi
          npm run build
          rm -rf node_modules

      # Step 5: Backup uploads + clean server dir
      - name: Prepare server directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -e
            sudo mkdir -p /var/www/.viverider-persist /var/www/viverider
            if [ -d /var/www/viverider/storage/app/public/uploads ]; then
              sudo rsync -a --delete /var/www/viverider/storage/app/public/uploads/ /var/www/.viverider-persist/uploads/
            fi
            sudo rm -rf /var/www/viverider/* /var/www/viverider/.[!.]* /var/www/viverider/..?* 2>/dev/null || true
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /var/www/viverider
            chmod -R u+rwX /var/www/viverider

      # Step 6: Upload app to server
      - name: Upload app to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          port: 22
          overwrite: true
          source: ".env,app,bootstrap,config,database,deploy,public,resources,routes,storage,vendor,artisan,composer.json,composer.lock,package.json,docker-compose.db.yml,vite.config.js,phpunit.xml"
          target: "/var/www/viverider"

      # Step 7: Restart on server — migrate runs HERE (not in GitHub Actions)
      - name: Restart server + migrate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -e
            cd /var/www/viverider
            chmod +x deploy/remote-deploy.sh
            bash deploy/remote-deploy.sh
            echo "==> Server migrate done"
            sudo -u www-data php artisan migrate:status || true

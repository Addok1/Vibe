name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend assets
        run: |
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi
          npm run build

      - name: Clean server directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -e
            sudo mkdir -p /var/www/viverider
            sudo rm -rf /var/www/viverider/*
            sudo rm -rf /var/www/viverider/.[!.]* /var/www/viverider/..?* || true
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /var/www/viverider
            chmod -R u+rwX /var/www/viverider

      - name: Upload code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          source: "./*"
          target: "/var/www/viverider"
          overwrite: true

      - name: Run Docker on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -euxo pipefail
            sudo chown -R $USER:$USER /var/www/viverider
            cd /var/www/viverider
            ls -la

            APP_DIR=""
            for d in "/var/www/viverider" "/var/www/viverider/website" "/var/www/viverider/viverider"; do
              if [ -f "$d/docker-compose.yml" ] && [ -f "$d/Dockerfile" ] && [ -f "$d/package.json" ]; then
                APP_DIR="$d"
                break
              fi
            done

            if [ -z "$APP_DIR" ]; then
              echo "App root not found (docker-compose.yml/Dockerfile/package.json)."
              exit 1
            fi

            cd "$APP_DIR"
            printf "%s" '${{ secrets.SERVER_ENV }}' > .env
            APP_PORT=9000 MYSQL_PORT=3306 docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
            APP_PORT=9000 MYSQL_PORT=3306 docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

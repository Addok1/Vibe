name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: mbstring, bcmath, intl, gd, pdo_mysql, zip, curl, xml, exif, pcntl
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies and build
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi
          npm run build
          rm -rf node_modules

      - name: Clean server directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -e
            sudo mkdir -p /var/www/viverider
            sudo rm -rf /var/www/viverider/*
            sudo rm -rf /var/www/viverider/.[!.]* /var/www/viverider/..?* || true
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /var/www/viverider
            chmod -R u+rwX /var/www/viverider

      - name: Upload code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          source: "./*"
          target: "/var/www/viverider"
          overwrite: true

      - name: Deploy on server (no Docker)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -euxo pipefail
            cd /var/www/viverider

            php -v

            printf "%s" '${{ secrets.SERVER_ENV }}' > .env

            php artisan storage:link --force 2>/dev/null || true
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache

            sudo systemctl reload php8.5-fpm
            sudo systemctl reload nginx

            echo "Deploy complete: http://viverider.online"

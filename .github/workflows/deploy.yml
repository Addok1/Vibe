name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clean server directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -e
            sudo mkdir -p /var/www/viverider
            sudo rm -rf /var/www/viverider/*
            sudo rm -rf /var/www/viverider/.[!.]* /var/www/viverider/..?* || true
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /var/www/viverider
            chmod -R u+rwX /var/www/viverider

      - name: Upload code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          source: "./*"
          target: "/var/www/viverider"
          overwrite: true

      - name: Run Docker on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -e
            if [ -f /var/www/viverider/website/docker-compose.yml ]; then
              cd /var/www/viverider/website
            else
              cd /var/www/viverider
            fi
            printf "%s" '${{ secrets.SERVER_ENV }}' > .env
            sudo chown -R $USER:$USER /var/www/viverider
            HTTP_PORT=80 HTTPS_PORT=443 MYSQL_PORT=3306 docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

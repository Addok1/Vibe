name: Deploy

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # maatwebsite/excel 3.x locks phpspreadsheet 1.x (<8.5); build on 8.4, run on server 8.5
          php-version: "8.4"
          extensions: mbstring, bcmath, intl, gd, pdo_mysql, zip, curl, xml, exif, pcntl
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies and build
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --no-scripts
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi
          npm run build
          rm -rf node_modules

      - name: Clean server directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -e
            sudo mkdir -p /var/www/viverider
            sudo rm -rf /var/www/viverider/*
            sudo rm -rf /var/www/viverider/.[!.]* /var/www/viverider/..?* || true
            sudo chown -R ${{ secrets.USER }}:${{ secrets.USER }} /var/www/viverider
            chmod -R u+rwX /var/www/viverider

      - name: Upload code to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          source: "./*"
          target: "/var/www/viverider"
          overwrite: true

      - name: Deploy on server (app host + mysql docker)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH }}
          script: |
            set -exo pipefail
            cd /var/www/viverider

            php -v

            printf "%s" '${{ secrets.SERVER_ENV }}' > .env

            read_env() {
              grep -E "^${1}=" .env 2>/dev/null | head -n1 | cut -d= -f2- | sed 's/^"\(.*\)"$/\1/' | sed "s/^'\(.*\)'$/\1/" | tr -d '\r' || true
            }

            if [ "$(read_env DB_HOST)" = "mysql" ]; then
              sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
            fi

            DB_DATABASE="$(read_env DB_DATABASE)"
            DB_USERNAME="$(read_env DB_USERNAME)"
            DB_PASSWORD="$(read_env DB_PASSWORD)"
            DB_ROOT_PASSWORD="$(read_env DB_ROOT_PASSWORD)"
            DB_ROOT_PASSWORD="${DB_ROOT_PASSWORD:-$DB_PASSWORD}"

            if [ -z "$DB_DATABASE" ] || [ -z "$DB_USERNAME" ] || [ -z "$DB_PASSWORD" ]; then
              echo "Missing required DB_* values in .env (DB_DATABASE, DB_USERNAME, DB_PASSWORD)."
              exit 1
            fi

            export DB_DATABASE DB_USERNAME DB_PASSWORD DB_ROOT_PASSWORD

            sudo systemctl stop mysql 2>/dev/null || true

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is required for MySQL container. Install docker first."
              exit 1
            fi

            if docker compose version >/dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="docker-compose"
            else
              echo "Docker Compose is required. Install docker compose plugin."
              exit 1
            fi

            $DOCKER_COMPOSE_CMD -f docker-compose.db.yml up -d

            for i in $(seq 1 30); do
              if docker exec viverider-mysql mysqladmin ping -h 127.0.0.1 -u"${DB_USERNAME}" -p"${DB_PASSWORD}" --silent >/dev/null 2>&1; then
                echo "MySQL is ready."
                break
              fi
              if [ "$i" -eq 30 ]; then
                echo "MySQL container failed to become ready in time."
                docker logs viverider-mysql --tail 100 || true
                exit 1
              fi
              sleep 2
            done

            SEED_LOCK="/var/www/.viverider-db-seeded"

            if [ -f "${SEED_LOCK}" ]; then
              echo "Database seed already applied (${SEED_LOCK}), skipping import."
            elif [ -f database/database.sql ]; then
              SEED_ROWS="$(docker exec viverider-mysql mysql -h 127.0.0.1 -u"${DB_USERNAME}" -p"${DB_PASSWORD}" -Nse "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema='${DB_DATABASE}' AND table_name='landing_homes';" 2>/dev/null || echo 0)"
              if [ "${SEED_ROWS}" = "1" ]; then
                LANDING_ROWS="$(docker exec viverider-mysql mysql -h 127.0.0.1 -u"${DB_USERNAME}" -p"${DB_PASSWORD}" -Nse "SELECT COUNT(*) FROM ${DB_DATABASE}.landing_homes;" 2>/dev/null || echo 0)"
              else
                LANDING_ROWS=0
              fi

              if [ "${LANDING_ROWS}" = "0" ]; then
                echo "First deploy: seeding database from database/database.sql..."
                docker exec viverider-mysql mysql -h 127.0.0.1 -u root -p"${DB_ROOT_PASSWORD}" -e "DROP DATABASE IF EXISTS \`${DB_DATABASE}\`; CREATE DATABASE \`${DB_DATABASE}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci; GRANT ALL ON \`${DB_DATABASE}\`.* TO '${DB_USERNAME}'@'%'; FLUSH PRIVILEGES;"
                sed -e "s/\`taxi1\`/\`${DB_DATABASE}\`/g" \
                    -e '/^CREATE DATABASE IF NOT EXISTS/d' \
                    -e '/^USE `/d' \
                    database/database.sql | docker exec -i viverider-mysql mysql -h 127.0.0.1 -u"${DB_USERNAME}" -p"${DB_PASSWORD}" "${DB_DATABASE}"
                echo "Database seed imported."
              else
                echo "Database already has ${LANDING_ROWS} landing_homes rows, skipping import."
              fi

              sudo touch "${SEED_LOCK}"
              echo "Seed lock created: ${SEED_LOCK}"
            fi

            sudo mkdir -p storage/logs storage/framework/{cache,sessions,views} storage/app/public bootstrap/cache
            sudo chown -R www-data:www-data storage bootstrap/cache
            sudo chmod -R ug+rwx storage bootstrap/cache

            sudo -u www-data php artisan package:discover --ansi
            sudo -u www-data php artisan storage:link --force 2>/dev/null || true
            sudo -u www-data php artisan migrate --force
            sudo -u www-data php artisan config:cache
            sudo -u www-data php artisan view:cache

            sudo systemctl reload php8.5-fpm
            sudo systemctl reload nginx

            echo "Deploy complete: http://viverider.online"
